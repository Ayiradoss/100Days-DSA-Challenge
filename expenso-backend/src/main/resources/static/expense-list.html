<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Expenso - Expenses</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
      <div class="container-fluid">
        <a class="navbar-brand" href="dashboard.html">Expenso</a>
        <div class="collapse navbar-collapse">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="add-expense.html">Add Expense</a></li>
            <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container py-4">
      <h4>Expenses</h4>
      <div id="list">Loading...</div>
    </div>

    <script src="/js/app.js"></script>
    <script>
      const user = getUser();
      if (!user) location.href = 'login.html';

      async function load() {
        const items = await fetchExpenses();
        const list = document.getElementById('list');
        if (items.length === 0) { list.textContent = 'No expenses yet.'; return; }
        list.innerHTML = '<table class="table"><thead><tr><th>Title</th><th>Amount</th><th>Date</th><th>Category</th><th>Actions</th></tr></thead><tbody>' +
          items.map(e => `<tr><td>${e.title}</td><td>${e.amount}</td><td>${e.date}</td><td>${e.categoryName || ''}</td><td><button class="btn btn-sm btn-danger" data-id="${e.id}">Delete</button></td></tr>`).join('') +
          '</tbody></table>';
        list.querySelectorAll('button[data-id]').forEach(btn => {
          btn.addEventListener('click', async () => {
            const id = btn.getAttribute('data-id');
            await deleteExpense(id);
            load();
          });
        });
      }

      load();
    </script>
  </body>
</html>
