<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Expenso - Add Expense</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
      <div class="container-fluid">
        <a class="navbar-brand" href="dashboard.html">Expenso</a>
        <div class="collapse navbar-collapse">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="expense-list.html">Expenses</a></li>
            <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container py-4">
      <div class="row justify-content-center">
        <div class="col-md-8">
          <div class="card">
            <div class="card-body">
              <h5 class="card-title">Add Expense</h5>
              <div id="alert"></div>
              <form id="expenseForm">
                <div class="mb-3">
                  <label class="form-label">Title</label>
                  <input type="text" id="title" class="form-control" required>
                </div>
                <div class="mb-3">
                  <label class="form-label">Amount</label>
                  <input type="number" step="0.01" id="amount" class="form-control" required>
                </div>
                <div class="mb-3">
                  <label class="form-label">Date</label>
                  <input type="date" id="date" class="form-control" required>
                </div>
                <div class="mb-3">
                  <label class="form-label">Category</label>
                  <select id="category" class="form-select" required></select>
                </div>
                <button class="btn btn-primary" type="submit">Save</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
      const user = getUser();
      if (!user) location.href = 'login.html';
      const alertBox = document.getElementById('alert');

      async function loadCategories() {
        const cats = await fetchCategories();
        const sel = document.getElementById('category');
        sel.innerHTML = '';
        cats.forEach(c => {
          const opt = document.createElement('option');
          opt.value = c.id; opt.textContent = c.name; sel.appendChild(opt);
        });
      }

      document.getElementById('expenseForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const payload = {
          title: document.getElementById('title').value,
          amount: parseFloat(document.getElementById('amount').value),
          date: document.getElementById('date').value,
          categoryId: parseInt(document.getElementById('category').value),
          userId: user.id
        };
        const res = await addExpense(payload);
        if (res.ok) {
          window.location.href = 'expense-list.html';
        } else {
          const text = await res.text();
          showAlert(alertBox, text || 'Failed to add expense');
        }
      });

      loadCategories();
    </script>
  </body>
</html>
