
# --- Datasource (update with your credentials) ---
spring.datasource.url=jdbc:mysql://localhost:3306/expenso_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=change_me
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Enable JPA automatic schema update (use 'create' or 'create-drop' for development if desired)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Server settings
server.port=8080
